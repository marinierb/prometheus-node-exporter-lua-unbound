name: Build OpenWrt package

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    name: Build aarch64_cortex-a53
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: aarch64_cortex-a53
          FEEDNAME: marinierb_packages
          PACKAGES: prometheus-node-exporter-lua-unbound
          INDEX: 1
          NO_SHFMT_CHECK: 1

      - name: Upload APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: bin/packages/aarch64_cortex-a53/marinierb_packages/prometheus-node-exporter-lua-unbound-*.apk
