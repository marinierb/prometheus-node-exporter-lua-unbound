name: Build package

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ARCH: x86_64-25.12.0
      PACKAGES: prometheus-node-exporter-lua-unbound

    steps:
      - uses: actions/checkout@v4

      - name: Build package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ env.ARCH }}
          PACKAGES: ${{ env.PACKAGES }}
          FEEDNAME: custom
          EXTRA_CONFIG: |
            CONFIG_PACKAGE_libcurl=n
            CONFIG_PACKAGE_curl=n
            CONFIG_LIBCURL_LDAP=n

      - name: Prepare repo
        run: |
          mkdir -p repo/x86_64
          cp bin/packages/x86_64/custom/prometheus-node-exporter-lua-unbound-*.apk repo/x86_64/

      - name: Generate APK index (unsigned)
        run: |
          docker run --rm -v $PWD/repo:/repo alpine:latest sh -c "
            apk add --no-cache apk-tools
            cd /repo/x86_64
            apk index -o APKINDEX.tar.gz *.apk
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-feed
          path: repo/
